<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D Model Visualizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* Force white background even in system dark mode */
        :root { color-scheme: light; } 

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ffffff !important; 
            overflow: hidden; 
        }

        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #ffffff; 
            --poster-color: #ffffff;
        }

        /* The Navigation Bar - Positioned high to clear mobile UI bars */
        .nav-container {
            position: absolute;
            bottom: 90px; 
            margin-bottom: env(safe-area-inset-bottom); 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: fit-content;
            white-space: nowrap;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #FF6B00; 
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 15px; 
            line-height: 1;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:active { transform: scale(0.9); }

        .model-name {
            color: #FF6B00;
            font-size: 22px;
            font-weight: 800;
            min-width: 110px;
            text-align: center;
            letter-spacing: 1px;
            user-select: none;
        }

        /* Hide Vercel Toolbar & Feedback buttons */
        #vercel-live-feedback, .vercel-toolbar, [class*="vercel"] { 
            display: none !important; 
        }
    </style>
</head>
<body>

    <model-viewer id="viewer" 
        src="1.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="2" 
        shadow-softness="0.5"
        exposure="1.2"
        environment-image="neutral"
        ar-placement="floor"
        loading="eager"
        auto-rotate>
        
        <div class="nav-container">
            <button class="nav-btn" onclick="prevModel()" aria-label="Previous Model">◀</button>
            <div id="displayName" class="model-name">STR-A</div>
            <button class="nav-btn" onclick="nextModel()" aria-label="Next Model">▶</button>
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const nameDisplay = document.getElementById('displayName');
        
        const modelNames = {
            1: "STR-A",
            2: "STR-B",
            3: "STR-C",
            4: "STR-D",
            5: "STR-E",
            6: "STR-F",
            7: "STR-G",
            8: "STR-H",
            9: "STR-I",
            10: "STR-J",
            11: "STR-K"
        };

        const totalModels = 11;
        let currentId = 1;

        function updateUI(id) {
            currentId = parseInt(id);
            if (isNaN(currentId) || currentId < 1 || currentId > totalModels) {
                currentId = 1;
            }
            
            // MOBILE CACHE-BUSTER: 
            // Forces the phone to download the fresh model every time
            viewer.src = `./${currentId}.glb?v=${new Date().getTime()}`;
            
            nameDisplay.innerHTML = modelNames[currentId] || "Model " + currentId;
            
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?model=' + currentId;
            window.history.pushState({path:newUrl},'',newUrl);
        }

        function nextModel() {
            let next = currentId + 1;
            if (next > totalModels) next = 1;
            updateUI(next);
        }

        function prevModel() {
            let prev = currentId - 1;
            if (prev < 1) prev = totalModels;
            updateUI(prev);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const startId = urlParams.get('model') || 1;
        updateUI(startId);

    </script>
</body>
</html>
