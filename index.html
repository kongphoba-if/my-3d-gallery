<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f0f0; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; --poster-color: transparent; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select { padding: 5px 15px; border-radius: 15px; border: 1px solid #ccc; font-size: 16px; }
    </style>
</head>
<body>

    <model-viewer id="viewer" 
        src="1.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls poster="poster.webp" 
        shadow-intensity="1" auto-rotate>
        
        <div class="controls">
            <select id="modelSelect">
                </select>
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const selector = document.getElementById('modelSelect');
        const totalModels = 11;

        // 1. Setup the dropdown menu
        for (let i = 1; i <= totalModels; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = 'Model ' + i;
            selector.appendChild(opt);
        }

        // 2. Function to load a specific model
        function loadModel(num) {
            if (num > 0 && num <= totalModels) {
                viewer.src = num + '.glb';
                selector.value = num;
            }
        }

        // 3. Logic: Check the URL for "?model=X"
        const urlParams = new URLSearchParams(window.location.search);
        const modelId = urlParams.get('model');
        if (modelId) {
            loadModel(modelId);
        }

        // 4. Manual switch via dropdown
        selector.addEventListener('change', (e) => {
            loadModel(e.target.value);
        });
    </script>
</body>
</html>
